<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">

    <title>Demon Setup Merkezi</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f0f; color: #e0e0e0; text-align: center; padding: 40px 20px; }
        .container { max-width: 600px; margin: auto; background: #1a1a1a; padding: 30px; border-radius: 15px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #ff3e3e; text-transform: uppercase; letter-spacing: 2px; }
        .btn { 
            display: block; background: #252525; color: #ff3e3e; padding: 18px; 
            margin: 15px 0; text-decoration: none; border-radius: 10px; 
            font-weight: bold; transition: 0.3s; border: 1px solid #ff3e3e;
        }
        .btn:hover { background: #ff3e3e; color: #000; transform: scale(1.02); }
        p { opacity: 0.6; font-size: 14px; }
    </style>
</head>
<body>

        <p style="margin-top: 30px;">Hız ve Zaman Tasarrufu İçin Tasarlandı</p>
