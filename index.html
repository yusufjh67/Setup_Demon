    <style>
        body { 
            font-family: 'Fredoka', sans-serif; 
            background: #050505; color: #fdfdfd; text-align: center; padding: 20px; margin: 0; 
        }
        
        /* === NEFES ALMA EFEKTİ (SİYAH <-> PEMBE) === */
        @keyframes breathAnimation {
            0%, 100% {
                /* Tamamen sönük ve siyah hali */
                color: #222; 
                text-shadow: 0 0 0px rgba(255, 105, 180, 0);
                box-shadow: 0 0 5px rgba(255, 105, 180, 0);
                border-color: #1a1a1a;
            }
            50% {
                /* En parlak pembe hali */
                color: #FF69B4; 
                text-shadow: 0 0 20px rgba(255, 105, 180, 0.8), 0 0 40px rgba(255, 105, 180, 0.4);
                box-shadow: 0 0 50px rgba(255, 105, 180, 0.3);
                border-color: #FF69B4;
            }
        }

        .container { 
            max-width: 500px; margin: 20px auto; background: #0d0d0d; padding: 30px; 
            border-radius: 35px; border: 2px solid #222; 
            /* Kutu için senkronize nefes efekti */
            animation: breathAnimation 4s infinite ease-in-out;
        }
        
        h1 { 
            font-family: 'Dancing Script', cursive;
            margin-bottom: 5px; font-size: 38px; 
            /* Başlık için senkronize nefes efekti */
            animation: breathAnimation 4s infinite ease-in-out;
        }
        /* =========================================== */

        .subtitle { opacity: 0.7; font-size: 13px; margin-bottom: 30px; color: #FFB6C1; }
        
        .group-header { 
            color: #FF69B4; font-size: 18px; text-align: left; 
            margin: 30px 0 15px 5px; padding-left: 12px;
            font-weight: 600; border-left: 5px solid #FF69B4;
        }

        .btn { 
            display: flex; justify-content: space-between; align-items: center;
            background: #141414; color: #fff; padding: 18px 25px; 
            margin: 12px 0; text-decoration: none; 
            border-radius: 22px; 
            font-family: 'Dancing Script', cursive; 
            font-size: 16px; 
            transition: all 0.4s ease; 
            border: 1px solid #252525;
        }
        
        .btn:hover { 
            background: #FF69B4; color: #fff; border-color: #FFB6C1; 
            transform: scale(1.05); 
            box-shadow: 0 0 25px rgba(255, 105, 180, 0.6);
        }

        .btn span { 
            font-family: 'Fredoka', sans-serif;
            font-size: 10px; font-weight: 600; color: #FFB6C1;
            background: rgba(255, 105, 180, 0.1); padding: 5px 10px; border-radius: 10px; 
        }
        
        footer { margin-top: 50px; font-size: 14px; opacity: 0.6; color: #FF69B4; font-family: 'Dancing Script', cursive; }
