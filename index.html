<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demon Setup | Sparkle Ponpon Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Fredoka', sans-serif; 
            background: #050505; color: #fdfdfd; text-align: center; padding: 20px; margin: 0; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        
        /* === NEON ÇİZGİ & SPARKLY PONPON UÇ === */
        .neon-wrapper {
            position: relative;
            max-width: 500px;
            width: 100%;
            padding: 3px; 
            border-radius: 38px;
            overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
        }

        /* 1. KATMAN: NORMAL TEKLİ ÇİZGİ */
        .neon-wrapper::before {
            content: '';
            position: absolute;
            width: 180%; height: 180%;
            background: conic-gradient(
                from 0deg,
                transparent 0%,
                transparent 80%, 
                #FF69B4 98%,
                transparent 100%
            );
            animation: rotateAll 4s linear infinite;
            filter: blur(2px);
        }

        /* 2. KATMAN: KABARIK PONPON & SPARKLES */
        /* Birden fazla radial-gradient ile etrafa saçılan yıldız/parıltı etkisi */
        .neon-wrapper::after {
            content: '';
            position: absolute;
            width: 180%; height: 180%;
            background: 
                /* Ana Ponpon Gövdesi */
                radial-gradient(circle at 50% 10%, #FF1493 0%, #FF69B4 5%, transparent 15%),
                /* Sparkles (Parıltılar) */
                radial-gradient(circle at 48% 8%, #fff 0%, transparent 1%),
                radial-gradient(circle at 52% 12%, #fff 0%, transparent 1%),
                radial-gradient(circle at 50% 5%, #FFB6C1 0%, transparent 2%),
                radial-gradient(circle at 45% 10%, #FFB6C1 0%, transparent 2%),
                radial-gradient(circle at 55% 10%, #FFB6C1 0%, transparent 2%);
            
            animation: rotateAll 4s linear infinite, sparkleBlink 0.5s infinite alternate;
            filter: blur(4px); /* Parıltıların seçilmesi için blur'u biraz azalttım */
            z-index: 0;
        }

        @keyframes rotateAll {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Parıltıların yanıp sönme efekti */
        @keyframes sparkleBlink {
            0% { opacity: 0.7; transform: rotate(0deg) scale(1); }
            100% { opacity: 1; transform: rotate(0deg) scale(1.1); }
        }

        .container { 
            position: relative;
            width: 100%;
            background: #0d0d0d; 
            padding: 30px; 
            border-radius: 35px;
            z-index: 1; 
            box-shadow: inset 0 0 15px rgba(0,0,0,0.9);
        }
        
        /* Başlık Glow */
        @keyframes softGlow {
            0%, 100% { text-shadow: 0 0 5px rgba(255, 105, 180, 0.2); opacity: 0.9; }
            50% { text-shadow: 0 0 15px rgba(255, 105, 180, 0.5); opacity: 1; }
        }

        h1 { 
            font-family: 'Dancing Script', cursive;
            margin-bottom: 5px; font-size: 38px; color: #FF69B4; 
            animation: softGlow 4s infinite ease-in-out;
        }

        .subtitle { opacity: 0.7; font-size: 13px; margin-bottom: 30px; color: #FFB6C1; }
        .group-header { color: #FF69B4; font-size: 18px; text-align: left; margin: 30px 0 15px 5px; padding-left: 12px; font-weight: 600; border-left: 5px solid #FF69B4; }
        .btn { display: flex; justify-content: space-between; align-items: center; background: #141414; color: #fff; padding: 18px 25px; margin: 12px 0; text-decoration: none; border-radius: 22px; font-family: 'Dancing Script', cursive; font-size: 16px; transition: all 0.4s ease; border: 1px solid #252525; }
        .btn:hover { background: #FF69B4; color: #fff; border-color: #FFB6C1; transform: scale(1.04); box-shadow: 0 0 15px rgba(255, 105, 180, 0.4); }
        .btn span { font-family: 'Fredoka', sans-serif; font-size: 10px; font-weight: 600; color: #FFB6C1; background: rgba(255, 105, 180, 0.1); padding: 5px 10px; border-radius: 10px; }
        footer { margin-top: 50px; font-size: 14px; opacity: 0.6; color: #FF69B4; font-family: 'Dancing Script', cursive; }
    </style>
</head>
