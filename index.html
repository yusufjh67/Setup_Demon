<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demon Setup | Ultra Smooth Sparkle</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Fredoka', sans-serif; 
            background: #050505; color: #fdfdfd; text-align: center; padding: 20px; margin: 0; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }
        
        .neon-wrapper {
            position: relative;
            max-width: 500px; width: 100%;
            padding: 3px; border-radius: 38px;
            overflow: hidden; background: #111;
        }

        /* Dönen Işık ve Ponpon Uç */
        .neon-wrapper::before {
            content: '';
            position: absolute;
            width: 150%; height: 150%;
            top: -25%; left: -25%;
            /* Çizgi ve Ponponun birleşimi */
            background: conic-gradient(
                from 0deg,
                transparent 70%, 
                rgba(255, 105, 180, 0.3) 85%, 
                #FF69B4 95%, 
                #fff 100%
            );
            animation: rotateAll 3s linear infinite;
        }

        /* --- GERÇEK SPARKLE (PARILTI) EFEKTİ --- */
        .neon-wrapper::after {
            content: '✨'; /* Karakter bazlı sparkle */
            position: absolute;
            font-size: 20px;
            color: #fff;
            text-shadow: 0 0 10px #FF69B4, 0 0 20px #FF1493;
            /* Ponponun ucuna sabitleme simülasyonu */
            width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            /* Dönüşü ana kutuya göre ayarlı */
            offset-path: rect(0% auto 100% auto);
            animation: moveSparkle 3s linear infinite, blink 0.2s infinite alternate;
            z-index: 2;
        }

        @keyframes rotateAll {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Yıldızın kenarlarda dönme hareketi */
        @keyframes blink {
            0% { opacity: 0.5; transform: scale(0.8) rotate(0deg); }
            100% { opacity: 1; transform: scale(1.2) rotate(20deg); }
        }

        .container { 
            position: relative; width: 100%; background: #0d0d0d; 
            padding: 30px; border-radius: 35px; z-index: 1; 
        }
        
        /* Başlık Glow */
        h1 { 
            font-family: 'Dancing Script', cursive; margin-bottom: 5px; font-size: 38px; color: #FF69B4; 
            text-shadow: 0 0 10px rgba(255, 105, 180, 0.5);
            animation: softBreath 4s infinite ease-in-out;
        }

        @keyframes softBreath {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; text-shadow: 0 0 20px #FF69B4; }
        }

        .subtitle { opacity: 0.7; font-size: 13px; margin-bottom: 30px; color: #FFB6C1; }
        .group-header { color: #FF69B4; font-size: 18px; text-align: left; margin: 30px 0 15px 5px; padding-left: 12px; font-weight: 600; border-left: 5px solid #FF69B4; }
        .btn { display: flex; justify-content: space-between; align-items: center; background: #141414; color: #fff; padding: 18px 25px; margin: 12px 0; text-decoration: none; border-radius: 22px; font-family: 'Dancing Script', cursive; font-size: 16px; transition: 0.3s; border: 1px solid #252525; }
        .btn:hover { background: #FF69B4; color: #fff; transform: scale(1.03); box-shadow: 0 0 15px rgba(255, 105, 180, 0.4); }
        .btn span { font-family: 'Fredoka', sans-serif; font-size: 10px; font-weight: 600; color: #FFB6C1; background: rgba(255, 105, 180, 0.1); padding: 5px 10px; border-radius: 10px; }
        footer { margin-top: 50px; font-size: 14px; opacity: 0.6; color: #FF69B4; font-family: 'Dancing Script', cursive; }
    </style>
</head>
<body>

    <div class="neon-wrapper">
