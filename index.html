<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demon Setup | Pink Script</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Fredoka', sans-serif; 
            background: #050505; color: #fdfdfd; text-align: center; padding: 20px; margin: 0; 
        }
        .container { 
            max-width: 450px; /* Kutuyu biraz daralttık */
            margin: 20px auto; background: #0d0d0d; padding: 25px; 
            border-radius: 30px; border: 1px solid #222; 
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.15); 
        }
        
        h1 { 
            font-family: 'Dancing Script', cursive;
            color: #FF69B4; margin-bottom: 2px; font-size: 30px; /* Başlık küçültüldü */
            text-shadow: 2px 2px 10px rgba(255, 105, 180, 0.6); 
        }
        .subtitle { opacity: 0.7; font-size: 11px; margin-bottom: 25px; color: #FFB6C1; }
        
        .group-header { 
            color: #FF69B4; font-size: 15px; text-align: left; 
            margin: 20px 0 10px 5px; padding-left: 10px;
            font-weight: 600; border-left: 4px solid #FF69B4;
        }

        .btn { 
            display: flex; justify-content: space-between; align-items: center;
            background: #141414; color: #fff; padding: 14px 20px; /* İç boşluk azaltıldı */
            margin: 10px 0; text-decoration: none; 
            border-radius: 18px; 
            font-family: 'Dancing Script', cursive; 
            font-size: 17px; /* BUTON YAZI BOYUTU KÜÇÜLTÜLDÜ */
            transition: all 0.3s ease; 
            border: 1px solid #252525;
        }
        
        .btn:hover { 
            background: #FF69B4; color: #fff; border-color: #FFB6C1; 
            transform: scale(1.03); 
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.5);
        }

        .btn span { 
            font-family: 'Fredoka', sans-serif;
            font-size: 9px; font-weight: 600; color: #FFB6C1;
            background: rgba(255, 105, 180, 0.15); padding: 3px 8px; border-radius: 8px; 
        }
        
        footer { margin-top: 40px; font-size: 12px; opacity: 0.6; color: #FF69B4; font-family: 'Dancing Script', cursive; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Demon Setup Merkezi</h1>
        <div class="subtitle">✨ Your Magical Launcher ✨</div>

        <div class="group-header">Windows 🪟</div>

        <a href="LINK_BURAYA" class="btn">Discord Desktop <span>EXE</span></a>

        <div class="group-header">Linux 🐧</div>

        <a href="LINK_BURAYA" class="btn">Visual Studio Code <span>TAR.GZ</span></a>
        <a href="LINK_BURAYA" class="btn">Terminal Config <span>SH</span></a>

        <div class="group-header">Android 🤖</div>

        <a href="LINK_BURAYA" class="btn">Custom Client <span>APK</span></a>

        <footer>Made with love by Miya 🌸</footer>
