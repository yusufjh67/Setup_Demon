<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">

    <title>Demon Setup | Bubblegum Pink</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Fredoka', sans-serif; /* Yeni yumuşak font */
            background: #050505; color: #fdfdfd; text-align: center; padding: 20px; margin: 0; 
        }
        .container { 
            max-width: 500px; margin: 20px auto; background: #0d0d0d; padding: 30px; 
            border-radius: 35px; /* Daha yuvarlak köşeler */
            border: 2px solid #222; 
            box-shadow: 0 0 35px rgba(255, 105, 180, 0.15); 
        }
        
        h1 { 
            color: #FF69B4; text-transform: uppercase; letter-spacing: 4px; 
            margin-bottom: 5px; font-size: 28px; 
            text-shadow: 2px 2px 10px rgba(255, 105, 180, 0.7); 
        }
        .subtitle { opacity: 0.6; font-size: 12px; margin-bottom: 30px; letter-spacing: 1px; color: #FFB6C1; }
        
        .group-header { 
            color: #FF69B4; font-size: 16px; text-align: left; 
            margin: 30px 0 15px 5px; padding-left: 12px;
            font-weight: 600;
            border-left: 5px solid #FF69B4;
            border-radius: 2px;
        }

        .btn { 
            display: flex; justify-content: space-between; align-items: center;
            background: #141414; color: #fff; padding: 18px 25px; 
            margin: 12px 0; text-decoration: none; 
            border-radius: 20px; /* Daha pofuduk butonlar */
            font-weight: 400; transition: all 0.4s ease; 
            border: 1px solid #252525; font-size: 16px;
        }
        
        .btn:hover { 
            background: #FF69B4; color: #fff; border-color: #FFB6C1; 
            transform: scale(1.05); 
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.6);
        }

        .btn span { 
            font-size: 10px; font-weight: 600; color: #FFB6C1;
            background: rgba(255, 105, 180, 0.1); padding: 5px 10px; border-radius: 12px; 
        }
        .btn:hover span { color: #fff; background: rgba(0,0,0,0.2); }
        
        footer { margin-top: 50px; font-size: 12px; opacity: 0.4; color: #FF69B4; font-weight: 600; }
    </style>
</head>
<body>

    <div class="container">
